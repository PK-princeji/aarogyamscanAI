{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/upload.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="upload-container">
          <h2>Upload X-Ray Image</h2>
 
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form action="{{ url_for('xray_upload_route') }}" method="POST" enctype="multipart/form-data" class="upload-form">
        <div class="form-group">
             <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
             <div class="input-with-icon">
                <i class="fas fa-birthday-cake icon-age"></i>
                <input type="number" id="age" name="age" placeholder="Enter your age" required>
            </div>
        </div>

        <div class="form-group">
             <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>

            </select>
        </div>

        <div class="form-group">
             <input type="text" id="address" name="address" placeholder="Enter your address" required>
        </div>

        <div class="form-group">
             <input type="file" id="xray_image" name="xray_image" accept="image/*" required>
            <div class="file-upload-animation">Choose File</div>
        </div>

        <button type="submit" class="submit-btn">Upload</button>
    </form>
</div>
{% endblock %}
