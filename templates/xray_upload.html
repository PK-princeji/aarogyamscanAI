{% extends "base.html" %}
{% block content %}
<div class="upload-container" style="max-width: 600px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50;">Patient Scan Portal</h2>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">Securely upload radiological images for AI evaluation.</p>
    
    <form action="{{ url_for('xray_upload_route') }}" method="POST" enctype="multipart/form-data">
        <div style="margin-bottom: 15px;">
            <label>Patient Full Name</label>
            <input type="text" name="name" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label>Patient Age</label>
                <input type="number" name="age" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
            </div>
            <div style="flex: 1;">
                <label>Biological Sex</label>
                <select name="gender" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Location / Address</label>
            <input type="text" name="address" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
        </div>
        <div style="margin-bottom: 25px; border: 2px dashed #3498db; padding: 20px; text-align: center; border-radius: 10px;">
            <label for="file-upload" style="cursor: pointer; color: #3498db; font-weight: bold;">Click to Upload X-Ray Scan</label>
            <input id="file-upload" type="file" name="file" style="display: block; margin: 10px auto;" required>
            <small style="color: #95a5a6;">Supported: JPEG, PNG</small>
        </div>
        <button type="submit" style="width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;">Execute Neural Analysis</button>
    </form>
</div>
{% endblock %}
