{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block content %}
<div class="register-container">
    <h2>Create an Account</h2>

    <!-- Registration Form -->
    <form method="POST" class="register-form">
    
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
    
    <input type="email" id="email" name="email" placeholder="e.g., yourname@example.com" required>
    
    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
    
    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>

    <input type="text" id="phone" name="phone" placeholder="Enter 10-digit mobile number" required>

    <button type="submit" class="btn-main">Register</button>
</form>
    <!-- OTP Form -->
    <!-- {% if session.pending_email %}
    <form method="POST" action="{{ url_for('verify_otp') }}" class="otp-form">
        <label for="otp">Enter OTP sent to your email/phone:</label>
        <input type="text" id="otp" name="otp" required>
        <button type="submit" class="btn-main">Verify OTP</button>
    </form>
    {% endif %} -->

    <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</div>
{% endblock %}
